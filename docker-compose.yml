name: agent-sandbox
services:
  agent-sandbox:
    image: ghcr.io/matuscvengros/agent-sandbox:latest
    user: agent
    env_file: .env
    working_dir: ${PWD}
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      # R/W project workspace — 1:1 mirror of the caller's current directory
      - ${PWD}:${PWD}
      # SSH agent forwarding via OrbStack's documented host-services socket
      - /run/host-services/ssh-auth.sock:/ssh-agent
    stdin_open: true
    tty: true
    network_mode: bridge
